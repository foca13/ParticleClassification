# configs/default.yaml
seed: 42
output_dir: "runs"

data:
  path: "data/cytoplasmic/tracks.csv"
  frame_rate: 10
  test_size: 0.25
  # val_tracks:                           # manual validation split (overrides test_size/seed)
  #   endosome: [2, 3, 10, 12]
  #   golgi: [0, 1]
  #   postgolgi: [1, 4, 7]

graph:
  max_frame_distance: 3
  Dt_range: [80, 150]

model:
  encoder_dimension: 96
  num_blocks: 4
  num_classes: 3

training:
  lr: 1e-4
  weight_decay: 5e-4
  batch_size: 16
  val_batch_size: 256
  num_epochs: 80
  sample_balanced: true
  weighted_loss: false
  dataset_size_multiplier: 3            # scales sampled trajectories: size = multiplier * total_frames / mean(Dt_range)
  scheduler:                            # warmup + cosine annealing (remove comment to enable)
    warmup_epochs: 5                    # linear warmup duration (epochs)
    start_factor: 0.1                   # initial LR fraction at warmup start (ramps to 1.0)
    eta_min: 5e-5                       # minimum LR at the end of cosine decay